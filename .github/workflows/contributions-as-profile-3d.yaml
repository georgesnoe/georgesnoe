name: Generate Contributions as Profile 3D

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          MAX_REPOS: 250
      - name: Commit & Push
        run: |
          git config user.name "Kossi Georges-Noé AHOMBO"
          git config user.email "georges.ahombo@gmail.com"
          git add -A .
          if git commit -m "update: GitHub 3D Profile"; then
            git push
          fi
